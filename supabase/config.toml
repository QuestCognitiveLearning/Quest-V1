# Config.toml keys are case-insensitive at the Supabase API layer, so the
# names below are intentionally lowercase to match the canonical slugs the
# platform stores. They control whether the JWT is verified on incoming
# requests — Stripe and the cron job don't carry one, so we disable it.
#
# To apply these flags, deploy with the explicit --no-verify-jwt flag:
#   supabase functions deploy stripeWebhook --no-verify-jwt
#   supabase functions deploy checkDueReviews --no-verify-jwt
#   supabase functions deploy contactForm --no-verify-jwt
#   supabase functions deploy classlinkSso --no-verify-jwt
#
# classlinkSso (ClassLink OAuth2/OIDC SSO) — top-level browser redirects with
# no JWT, so it MUST be deployed with --no-verify-jwt. Set these secrets first:
#   supabase secrets set CLASSLINK_CLIENT_ID=...
#   supabase secrets set CLASSLINK_CLIENT_SECRET=...
#   supabase secrets set CLASSLINK_REDIRECT_URI=https://lgymrkodypbqghyjocxg.supabase.co/functions/v1/classlinkSso
# Optional: CLASSLINK_SCOPES (default "profile"), CLASSLINK_SITE_URL,
#           CLASSLINK_AUTH_URL, CLASSLINK_TOKEN_URL, CLASSLINK_INFO_URL.
# Also add https://questlearning.co/AuthCallback to Supabase Auth → URL
# Configuration → Redirect URLs, and set frontend VITE_CLASSLINK_SSO=true to
# reveal the "Continue with ClassLink" button.
#
# rosterSync (nightly ClassLink OneRoster ingest) — invoked by pg_cron via
# pg_net, which carries no JWT, so deploy with --no-verify-jwt; the function
# gates on X-Quest-Internal-Token like processTimeTriggers:
#   supabase functions deploy rosterSync --no-verify-jwt
# Secrets:
#   supabase secrets set CLASSLINK_ROSTER_API_KEY=...   (Partner Portal admin
#     generates this under Settings; bearer token for the OAuth2 proxy)
#   QUEST_INTERNAL_TOKEN is already set for the cron/email functions.
# Schedule: see the commented cron.schedule() block in migration 0049.
# Manual test run:
#   curl -X POST .../functions/v1/rosterSync \
#     -H "X-Quest-Internal-Token: $TOKEN" -H "Content-Type: application/json" \
#     -d '{"fixtures":"full"}'        # canned data, no ClassLink needed
#     -d '{"mode":"full"}'           # real pull from the proxy

# Both SSO and roster sync answer requests that carry no Supabase JWT
# (browser redirects / pg_net cron posts); each gates itself instead
# (state param + internal token). verify_jwt=false here means local serve
# and `supabase functions deploy` agree with the documented deploy flags.
[functions.classlinkSso]
verify_jwt = false

[functions.rosterSync]
verify_jwt = false
